name: limbo_os
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: 3.15.1
  firebase_auth: ^5.6.1
  cloud_firestore: 5.6.11

  # Social Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^7.0.1

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  flutter_hooks: ^0.21.1
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.7.2

  # UI & Animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  flutter_lucide: ^1.1.0


  # Nokia Player Dependencies
  just_audio: ^0.9.42
  mobile_scanner: ^6.0.0
  battery_plus: ^6.1.0
  flutter_native_splash: ^2.4.4

  # Image Cache
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.4
  build_runner: ^2.4.15
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

flutter_native_splash:
  color: "#131313"
  # image: assets/images/splash.png # Descomente quando tiver o ícone
  fullscreen: true
  ios: true

flutter:
  uses-material-design: true

